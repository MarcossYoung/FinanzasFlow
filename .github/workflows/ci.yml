name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backEnd
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Run Maven tests
        env:
          CLOUDINARY_CLOUD_NAME: ci-dummy
          CLOUDINARY_API_KEY: ci-dummy-key
          CLOUDINARY_API_SECRET: ci-dummy-secret
        run: ./mvnw -B clean verify

  frontend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontEnd/workflow
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontEnd/workflow/package-lock.json
      - name: Pin npm to 11 (match the lockfile's npm; Node 20 ships npm 10)
        run: npm install -g npm@11
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: CI=true npm test -- --watchAll=false
      - name: Build
        run: npm run build
