# Database Configuration
#
# Local development defaults to H2 so the app can start without a reachable
# external database. Set DATABASE_URL, DATABASE_USERNAME, DATABASE_PASSWORD, and
# optionally DATABASE_DRIVER/HIBERNATE_DIALECT for PostgreSQL/Neon deployments.
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:finanzasflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=${DATABASE_DRIVER:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.H2Dialect}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=false
server.port=${PORT:8080}

# Keep local/dev logs light by default. Override with env vars when debugging.
logging.level.org.hibernate.SQL=${HIBERNATE_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.type.descriptor.sql=${HIBERNATE_BIND_LOG_LEVEL:WARN}
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:WARN}
logging.level.com.example.demo=${APP_LOG_LEVEL:INFO}


server.error.whitelabel.enabled=false


spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

upload.receipts.path=./uploads/receipts

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

anthropic.api.key=${ANTHROPIC_API_KEY:}

n8n.webhook.product-created=${N8N_WEBHOOK_PRODUCT_CREATED:}
telegram.bot.token=${TELEGRAM_BOT_TOKEN:}
# Comma-separated Telegram chat IDs allowed to run admin bot commands.
# Empty in local/dev means admin commands are accepted for easy testing.
telegram.admin.chat-ids=${TELEGRAM_ADMIN_CHAT_IDS:}
telegram.reminders.cron=${TELEGRAM_REMINDERS_CRON:0 0 9 * * *}

jwt.secret=${JWT_SECRET:dev-only-change-me}

# Seed only essential login users by default. Set APP_SEED_DEMO_DATA=true
# when you want the large demo invoice/cost dataset.
app.seed.demo-data=${APP_SEED_DEMO_DATA:false}
app.reset-seed-passwords=${APP_RESET_SEED_PASSWORDS:false}

server.servlet.session.timeout=0
spring.session.store-type=none

#Dates configuration
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.serialization.write-dates-as-timestamps=false

spring.mvc.pathmatch.matching-strategy=ant_path_matcher

server.forward-headers-strategy=framework





